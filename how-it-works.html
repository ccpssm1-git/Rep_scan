<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepGuard | How It Works</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow: hidden; /* Prevent scrolling, it plays instantly */
        }
        h1, h2, h3, h4, h5, h6, .font-heading {
            font-family: 'Space Grotesk', sans-serif;
        }
        .timeline-grid {
            background-image: linear-gradient(rgba(255,255,255,0.03) 2px, transparent 2px), linear-gradient(90deg, rgba(255,255,255,0.03) 2px, transparent 2px); 
            background-size: 60px 60px;
            background-position: center;
        }
    </style>
</head>
<body class="bg-slate-950 w-screen h-screen flex flex-col relative timeline-grid">

    <!-- Navigation -->
    <nav class="absolute top-0 w-full z-50 py-6">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="bg-blue-600 text-white p-2 rounded-xl group-hover:bg-blue-500 transition-colors shadow-[0_0_15px_rgba(37,99,235,0.5)]">
                    <i data-lucide="shield" class="w-6 h-6"></i>
                </div>
                <span class="font-heading font-black text-2xl tracking-tighter text-white">RepGuard</span>
            </a>
            <a href="index.html" class="px-6 py-2.5 bg-white/10 hover:bg-white/20 border border-white/20 rounded-full text-sm font-bold text-white transition-all flex items-center gap-2 shadow-lg backdrop-blur-md">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Homepage
            </a>
        </div>
    </nav>

    <!-- THE 3D TIMELINE BLOCK -->
    <div class="flex-grow w-full flex flex-col justify-center items-center px-4 relative z-10 pt-16">
        
        <div class="text-center mb-10 opacity-0" id="header-text">
            <h1 class="font-heading text-4xl md:text-5xl font-black tracking-tight text-white mb-3">
                Active Defense Timeline
            </h1>
            <p class="text-slate-400 text-lg">Watch a crisis abstractly neutralized in 60 seconds.</p>
        </div>

        <div id="timeline-container" class="relative w-full max-w-6xl h-auto md:h-[500px] rounded-[3rem] border border-slate-700 overflow-hidden flex flex-col items-center justify-center p-8 md:p-12 shadow-[0_0_100px_rgba(37,99,235,0.15)] bg-slate-900/80 backdrop-blur-3xl" style="perspective: 1500px;">
            
            <div class="absolute top-10 right-10 px-4 py-2 border border-slate-600 rounded-full text-xs text-slate-300 font-bold uppercase tracking-widest bg-slate-800/80 shadow-xl opacity-0" id="how-it-works-badge">HOW IT WORKS</div>
            
            <div class="flex flex-col xl:flex-row items-center justify-center gap-8 md:gap-14 w-full z-10 py-12 md:py-0">
                
                <!-- SCAN -->
                <div class="flex flex-col items-center relative group timeline-card" style="opacity: 0;">
                    <div class="w-48 h-48 md:w-56 md:h-56 rounded-[2rem] border-2 border-blue-500 bg-slate-800/90 flex flex-col items-center justify-center p-6 shadow-[0_0_50px_rgba(59,130,246,0.3)] transition-transform group-hover:scale-105 duration-300 mx-8">
                        <div class="w-16 h-16 md:w-20 md:h-20 rounded-full border-2 border-blue-400/50 flex items-center justify-center mb-6 relative">
                            <div class="absolute inset-0 border-2 border-blue-500 rounded-full animate-ping opacity-60"></div>
                            <div class="w-8 h-8 md:w-10 md:h-10 bg-blue-500 rounded-full z-10 shadow-[0_0_20px_rgba(59,130,246,1)]"></div>
                        </div>
                        <h4 class="text-blue-400 font-heading font-black text-xl md:text-2xl mb-1 tracking-widest uppercase">SCAN</h4>
                        <div class="text-slate-300 text-xs md:text-sm font-medium">24/7 Monitor</div>
                    </div>
                    <div class="text-slate-500 text-sm mt-6 tracking-[0.3em] font-mono bg-slate-950 px-4 py-1.5 rounded-lg border border-slate-800">T+0s</div>
                </div>

                <!-- Arrow -->
                <div class="hidden xl:flex flex-col items-center justify-center w-12 text-blue-500 mb-10 timeline-arrow opacity-0 drop-shadow-[0_0_15px_rgba(59,130,246,0.8)]">
                    <i data-lucide="arrow-right" class="w-10 h-10"></i>
                </div>
                
                <!-- ANALYZE -->
                <div class="flex flex-col items-center relative group timeline-card" style="opacity: 0;">
                    <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-slate-900 border-2 border-red-500 text-red-500 text-[11px] md:text-[13px] uppercase px-5 py-2 rounded-xl shadow-[0_0_25px_rgba(239,68,68,0.5)] tracking-widest z-20 font-bold animate-[pulse_1.5s_infinite] whitespace-nowrap">RISK: 94% CRITICAL</div>
                    <div class="w-48 h-48 md:w-56 md:h-56 rounded-[2rem] border-2 border-orange-500 bg-slate-800/90 flex flex-col items-center justify-center p-6 shadow-[0_0_50px_rgba(249,115,22,0.3)] transition-transform group-hover:scale-105 duration-300 mx-8">
                        
                        <div class="flex items-end gap-2 h-16 md:h-20 mb-4">
                            <div class="w-3 md:w-4 bg-orange-500 rounded-sm h-8 animate-[bounce_1s_infinite]"></div>
                            <div class="w-3 md:w-4 bg-orange-400 rounded-sm h-12 animate-[bounce_1.2s_infinite]"></div>
                            <div class="w-3 md:w-4 bg-orange-500 rounded-sm h-16 animate-[bounce_0.8s_infinite]"></div>
                            <div class="w-3 md:w-4 bg-orange-400 rounded-sm h-14 animate-[bounce_1.5s_infinite]"></div>
                            <div class="w-3 md:w-4 bg-orange-500 rounded-sm h-10 animate-[bounce_1.1s_infinite]"></div>
                        </div>
                        <h4 class="text-orange-400 font-heading font-black text-xl md:text-2xl mb-1 tracking-widest uppercase">ANALYZE</h4>
                        <div class="text-slate-300 text-xs md:text-sm font-medium">AI Risk Intel</div>
                    </div>
                    <div class="text-slate-500 text-sm mt-6 tracking-[0.3em] font-mono bg-slate-950 px-4 py-1.5 rounded-lg border border-slate-800">T+2s</div>
                </div>

                <!-- Arrow -->
                <div class="hidden xl:flex flex-col items-center justify-center w-12 text-green-500 mb-10 timeline-arrow opacity-0 drop-shadow-[0_0_15px_rgba(34,197,94,0.8)]">
                    <i data-lucide="arrow-right" class="w-10 h-10"></i>
                </div>

                <!-- DEFEND -->
                <div class="flex flex-col items-center relative group timeline-card" style="opacity: 0;">
                    <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-green-950/90 border-2 border-green-500 text-green-400 text-[11px] md:text-[13px] uppercase px-5 py-2 rounded-xl shadow-[0_0_25px_rgba(34,197,94,0.6)] tracking-widest z-20 font-bold flex items-center gap-2 whitespace-nowrap backdrop-blur-md"><i data-lucide="check-circle" class="w-5 h-5"></i> NEUTRALIZED</div>
                    <div class="w-48 h-48 md:w-56 md:h-56 rounded-[2rem] border-2 border-green-500 bg-slate-800/90 flex flex-col items-center justify-center p-6 shadow-[0_0_50px_rgba(34,197,94,0.3)] relative overflow-hidden transition-transform group-hover:scale-105 duration-300 mx-8">
                        <div class="absolute inset-0 bg-green-500/10"></div>
                        <i data-lucide="shield-check" class="w-16 h-16 md:w-20 md:h-20 text-green-400 mb-4 z-10 drop-shadow-[0_0_25px_rgba(34,197,94,0.8)]"></i>
                        <h4 class="text-green-500 font-heading font-black text-xl md:text-2xl mb-1 tracking-widest z-10 uppercase">DEFEND</h4>
                        <div class="text-slate-300 text-xs md:text-sm font-medium z-10">Active Response</div>
                    </div>
                    <div class="text-slate-500 text-sm mt-6 tracking-[0.3em] font-mono bg-slate-950 px-4 py-1.5 rounded-lg border border-slate-800">T+60s</div>
                </div>
            </div>
            
            <div class="absolute bottom-6 text-xs font-bold text-slate-600 tracking-[0.4em] uppercase opacity-0" id="bottom-timeline-text">REPGUARD DEFENSE TIMELINE</div>
        </div>
    </div>

    <!-- Script to render Lucide Icons -->
    <script>
        lucide.createIcons();

        // GSAP Immediate Play Sequence (Doesn't rely on scrolling down!)
        const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

        // 1. Fade in the header
        tl.fromTo("#header-text", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 1 })
          
          // 2. Container glow and badge
          .to("#timeline-container", { boxShadow: "0 0 150px rgba(37,99,235,0.15)", duration: 1 }, "-=0.5")
          .to(["#how-it-works-badge", "#bottom-timeline-text"], { opacity: 1, duration: 0.8 }, "-=0.5")

          // 3. Stagger the cards in with true 3D transforms
          .fromTo(".timeline-card", 
              { z: -800, opacity: 0, rotationY: 45, x: (i) => i === 0 ? -100 : (i === 2 ? 100 : 0) },
              { z: 0, opacity: 1, rotationY: (i) => i === 0 ? 15 : (i === 1 ? 0 : -15), x: 0, duration: 1.5, stagger: 0.4, ease: "back.out(1.2)" },
              "-=0.2"
          )

          // 4. Stagger the arrows fading in
          .fromTo(".timeline-arrow",
              { opacity: 0, scale: 0.5, x: -20 },
              { opacity: 1, scale: 1, x: 0, duration: 0.8, stagger: 0.4 },
              "-=0.8"
          );

    </script>
</body>
</html>
